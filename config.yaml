data:
  n_events: 50000
  n_users: 500
  anomaly_fraction: 0.05
  random_seed: 42
  raw_path: "data/raw/events.csv"
  processed_path: "data/processed/features.csv"

features:
  rolling_windows: [5, 10, 30]
  z_score_threshold: 3.0

model:
  isolation_forest:
    contamination: 0.05
    n_estimators: 200
    random_state: 42
  lstm_autoencoder:
    sequence_length: 10
    hidden_dim: 64
    latent_dim: 32
    epochs: 30
    batch_size: 64
    learning_rate: 0.001
    threshold_percentile: 98

api:
  host: "0.0.0.0"
  port: 8000
  model_path: "saved_models/"

streaming:
  batch_size: 200
  delay_seconds: 0.1